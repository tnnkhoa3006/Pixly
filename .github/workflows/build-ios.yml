name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install iOS Rust targets
        run: |
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim

      - name: Install dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Init iOS project
        run: cargo tauri ios init

      - name: Build iOS (Simulator)
        run: cargo tauri ios build --target aarch64-sim

      - name: Package iOS build
        run: |
          APP_PATH=$(find src-tauri/gen/apple/build -name "pixly.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: pixly.app not found"
            find src-tauri/gen/apple/build -name "*.app" -type d
            exit 1
          fi
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/pixly-ios-sim.zip" "$(basename "$APP_PATH")"

      - name: Get version
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Pixly ${{ steps.version.outputs.tag }}
          files: pixly-ios-sim.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
